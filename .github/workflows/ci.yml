name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests ou vérifier le serveur
        run: |
          if find . -path ./node_modules -prune -o \( -name "*.test.js" -o -name "*.spec.js" \) -print | grep -q .; then
            npm test
          else
            echo "Aucun fichier de test trouvé, vérification de la syntaxe du serveur."
            node --check server.js
          fi
